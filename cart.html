<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'selector'
        }
    </script>
</head>

<body class="bg-green-50 text-gray-900">

<div class="max-w-5xl mx-auto p-10">

    <!-- Header -->
    <div class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-green-600">
            🛒 Shopping Cart
        </h1>

        <p class="text-gray-600 mt-2">
            Review your selected recipes.
        </p>
    </div>

    <!-- Back Button -->
    <a
            href="index.html#ex-20"
            class="inline-block mb-6 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition"
    >
        ← Back to Dashboard
    </a>

    <!-- Cart Card -->
    <div class="bg-white rounded-xl shadow-md border border-green-200 p-6">

        <div class="flex flex-col md:flex-row items-center gap-6">

            <!-- Image -->
            <img
                    src="images/pasta-carbonara.jpeg"
                    alt="Pasta Carbonara"
                    class="w-full md:w-64 h-48 object-cover rounded-lg"
            >

            <!-- Product Info -->
            <div class="flex-1">

                <h2 class="text-2xl font-bold text-green-700 mb-2">
                    🍝 Pasta Carbonara
                </h2>

                <p class="text-gray-600 mb-4">
                    Creamy pasta with bacon, parmesan cheese and black pepper.
                </p>

                <div class="flex justify-between items-center">

                    <span class="text-2xl font-bold text-green-700">
                        € 19.99
                    </span>

                    <button
                            class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                        Remove
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Summary -->
    <div class="mt-8 bg-white rounded-xl shadow-md border border-green-200 p-6">

        <h2 class="text-xl font-bold text-green-700 mb-4">
            Order Summary
        </h2>

        <div class="flex justify-between mb-2">
            <span>Items</span>
            <span>1</span>
        </div>

        <div class="flex justify-between mb-4">
            <span>Total</span>
            <span class="font-bold">€ 19.99</span>
        </div>

        <button
                class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold transition">
            Checkout
        </button>

    </div>

</div>

</body>
</html>
